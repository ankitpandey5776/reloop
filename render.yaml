services:
  - type: web
    name: reloop-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./reloop.db
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MOCK_MODE
        value: "false"
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: GROQ_API_KEY
        sync: false        # set this manually in Render dashboard — never commit the real key
      - key: GROQ_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
